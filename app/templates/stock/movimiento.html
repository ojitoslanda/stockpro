{% extends "base.html" %}
{% block title %}Registrar movimiento - StockPro{% endblock %}
{% block content %}

<h4>Registrar movimiento de stock</h4>

{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}

<form method="post" action="/stock/movimiento" class="mt-3">
    <div class="row">
        <div class="col-md-5 mb-3">
            <label class="form-label">Producto</label>
            <select name="producto_id" class="form-select" required>
                <option value="">Selecciona...</option>
                {% for p in productos %}
                <option value="{{ p.id }}">{{ p.codigo }} - {{ p.nombre }} (stock: {{ p.stock_actual }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-3 mb-3">
            <label class="form-label">Tipo</label>
            <select name="tipo" class="form-select" required>
                <option value="entrada">Entrada</option>
                <option value="salida">Salida</option>
            </select>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" name="cantidad" min="1" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Motivo / nota</label>
        <input type="text" name="motivo" class="form-control" placeholder="Ej: Compra a proveedor, ajuste de inventario...">
    </div>

    <button type="submit" class="btn btn-primary">Registrar</button>
    <a href="/stock" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
