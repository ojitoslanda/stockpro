{% extends "base.html" %}
{% block title %}{{ "Editar" if producto else "Nuevo" }} producto - StockPro{% endblock %}
{% block content %}

<h4>{{ "Editar producto" if producto else "Nuevo producto" }}</h4>

<form method="post" action="{% if producto %}/productos/{{ producto.id }}/editar{% else %}/productos/nuevo{% endif %}" class="mt-3">
    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label">Código</label>
            <input type="text" name="codigo" class="form-control"
                   value="{{ producto.codigo if producto else '' }}" required>
        </div>
        <div class="col-md-5 mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control"
                   value="{{ producto.nombre if producto else '' }}" required>
        </div>
        <div class="col-md-4 mb-3">
            <label class="form-label">Categoría</label>
            <select name="categoria_id" class="form-select" required>
                <option value="">Selecciona...</option>
                {% for c in categorias %}
                <option value="{{ c.id }}"
                    {% if producto and producto.categoria_id == c.id %}selected{% endif %}>
                    {{ c.nombre }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-3 mb-3">
            <label class="form-label">Precio</label>
            <input type="number" step="0.01" name="precio" class="form-control"
                   value="{{ producto.precio if producto else '0' }}" required>
        </div>
        {% if not producto %}
        <div class="col-md-3 mb-3">
            <label class="form-label">Stock inicial</label>
            <input type="number" name="stock_actual" class="form-control" value="0">
        </div>
        {% endif %}
    </div>

    <button type="submit" class="btn btn-primary">Guardar</button>
    <a href="/productos" class="btn btn-outline-secondary">Cancelar</a>
</form>
{% endblock %}
